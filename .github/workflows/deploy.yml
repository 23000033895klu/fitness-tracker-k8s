name: Fitness App — Build & Deploy to K8s

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci && npm test
        working-directory: ./backend

  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          docker build -t $ECR_REGISTRY/fitness-backend:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/fitness-backend:${{ github.sha }}
          docker tag $ECR_REGISTRY/fitness-backend:${{ github.sha }} $ECR_REGISTRY/fitness-backend:latest
          docker push $ECR_REGISTRY/fitness-backend:latest

      - name: Build & push frontend
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ secrets.API_URL }} \
            -t $ECR_REGISTRY/fitness-frontend:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/fitness-frontend:${{ github.sha }}
          docker tag $ECR_REGISTRY/fitness-frontend:${{ github.sha }} $ECR_REGISTRY/fitness-frontend:latest
          docker push $ECR_REGISTRY/fitness-frontend:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set kubectl context
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K8S_MASTER_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl set image deployment/backend \
              backend=${{ env.ECR_REGISTRY }}/fitness-backend:${{ github.sha }} \
              -n fitness-app

            kubectl set image deployment/frontend \
              frontend=${{ env.ECR_REGISTRY }}/fitness-frontend:${{ github.sha }} \
              -n fitness-app

            kubectl rollout status deployment/backend  -n fitness-app --timeout=120s
            kubectl rollout status deployment/frontend -n fitness-app --timeout=120s

            echo "✅ Deployment complete!"
